<!DOCTYPE html>
<!--
  File: /index.html
  Description: Trial Balance Import Tool - Main Application
               Converts Trial Balance data to QBO import files
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trial Balance Import Tool</title>

  <!-- CSS Files -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/states.css">
  <link rel="stylesheet" href="css/help-panel.css">

  <!-- Favicon placeholder -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body>
  <!-- ============================================
       PASSWORD OVERLAY
       ============================================ -->
  <div id="password-overlay" class="password-overlay">
    <div class="password-overlay-backdrop"></div>
    <div class="password-card">
      <div class="password-header">
        <svg class="password-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <h2 class="password-title">Access Required</h2>
        <p class="password-subtitle">Enter the password to continue</p>
      </div>
      <form class="password-form" id="password-form">
        <div class="password-form-group">
          <input type="password" id="password-input" class="password-input" placeholder="Enter password" autocomplete="off" aria-label="Password">
          <div id="password-error" class="password-error" style="display: none;"></div>
        </div>
        <label class="password-remember">
          <input type="checkbox" id="remember-checkbox">
          <span>Remember me for 30 days</span>
        </label>
        <button type="submit" class="password-submit">Unlock</button>
      </form>
    </div>
  </div>

  <style>
    .password-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: pw-fadeIn 250ms ease-out;
    }
    .password-overlay.hidden {
      pointer-events: none;
      animation: pw-fadeOut 250ms ease-out forwards;
    }
    .password-overlay-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
    }
    .password-card {
      position: relative;
      background: var(--color-bg-card-alt);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow-lg);
      animation: pw-slideUp 250ms ease-out;
    }
    .password-header {
      text-align: center;
      margin-bottom: var(--space-lg);
    }
    .password-icon {
      width: 48px;
      height: 48px;
      color: var(--color-primary);
      margin-bottom: var(--space-md);
    }
    .password-title {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      margin: 0 0 var(--space-xs);
    }
    .password-subtitle {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      margin: 0;
    }
    .password-form-group {
      margin-bottom: var(--space-md);
    }
    .password-input {
      width: 100%;
      padding: var(--space-sm) var(--space-md);
      font-size: var(--font-size-md);
      font-family: var(--font-family);
      border: 1px solid var(--color-input-border);
      border-radius: var(--radius-md);
      background: var(--color-input-bg);
      color: var(--color-input-text);
      box-sizing: border-box;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }
    .password-input::placeholder { color: var(--color-input-placeholder); }
    .password-input:focus {
      outline: none;
      border-color: var(--color-input-border-focus);
      box-shadow: var(--shadow-focus);
    }
    .password-input.error { border-color: var(--color-error); }
    .password-error {
      margin-top: var(--space-xs);
      font-size: var(--font-size-sm);
      color: var(--color-error);
      animation: pw-shake 0.3s ease-in-out;
    }
    .password-remember {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-lg);
      cursor: pointer;
      user-select: none;
    }
    .password-remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--color-primary);
    }
    .password-remember span {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
    }
    .password-submit {
      width: 100%;
      padding: var(--space-sm) var(--space-md);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      font-family: var(--font-family);
      background: var(--color-btn-primary-bg);
      color: var(--color-btn-primary-text);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background-color 150ms ease;
    }
    .password-submit:hover { background: var(--color-btn-primary-hover); }
    .password-submit:active { background: var(--color-btn-primary-active); }
    @keyframes pw-fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pw-fadeOut { from { opacity: 1; } to { opacity: 0; } }
    @keyframes pw-slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pw-shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
  </style>

  <div class="app">
    <!-- ============================================
         HEADER
         ============================================ -->
    <header class="app-header">
      <div class="app-header-inner">
        <div class="app-logo">
          <svg class="app-logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          <span id="app-title">TB Import Tool</span>
        </div>

        <div class="app-header-actions">
          <button class="btn btn-ghost btn-sm" id="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
          <button class="btn btn-ghost btn-sm" id="lang-toggle" aria-label="Switch to French">
            FR
          </button>
          <button class="help-toggle-btn" id="help-toggle-btn" aria-label="Open help panel" title="Help">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- ============================================
         MAIN CONTENT - Rendered by UI.js
         ============================================ -->
    <main class="app-main">
      <!-- Loading state shown while reference data loads -->
      <div class="loading-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px;">
        <div class="spinner spinner-lg"></div>
        <p class="mt-lg text-muted">Loading...</p>
      </div>
    </main>

    <!-- ============================================
         FOOTER
         ============================================ -->
    <footer class="app-footer">
      <p id="app-footer">Trial Balance Import Tool • Version 1.0</p>
    </footer>
  </div>

  <!-- SheetJS Library (for Excel read/write) -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <!-- jsPDF Library (for PDF generation) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Application JavaScript (order matters) -->
  <script src="js/ui-strings.js"></script>
  <script src="js/data-loader.js"></script>
  <script src="js/state.js"></script>
  <script src="js/file-reader.js"></script>
  <script src="js/mapper.js"></script>
  <script src="js/exporter.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/help-panel.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
